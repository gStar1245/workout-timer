<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GymStack V2</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='4' y='26' width='10' height='12' rx='3' fill='%234f9eff'/%3E%3Crect x='50' y='26' width='10' height='12' rx='3' fill='%234f9eff'/%3E%3Crect x='12' y='20' width='8' height='24' rx='3' fill='%234f9eff'/%3E%3Crect x='44' y='20' width='8' height='24' rx='3' fill='%234f9eff'/%3E%3Crect x='20' y='29' width='24' height='6' rx='3' fill='%234f9eff'/%3E%3C/svg%3E">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <div class="tabs">
    <button class="tab active" onclick="App.switchTab('timer')">타이머</button>
    <button class="tab" onclick="App.switchTab('planner')">플래너</button>
    <button class="tab" onclick="App.switchTab('history')">기록</button>
  </div>

  <!-- ══ 타이머 탭 ══════════════════════════════════ -->
  <div id="timerTab">
    <div class="wake-indicator">
      <div class="wake-dot" id="wakeDot"></div>
      <span id="wakeLabel">화면 유지 비활성</span>
      <span class="wake-now" id="wakeNow"></span>
    </div>

    <div id="mainView">
      <div class="section-label">현재 운동</div>
      <div class="current-ex-card" id="timerCard">
        <div class="current-ex-top">
          <div class="ex-name" id="exName"></div>
          <div class="ex-counter">
            <span class="ex-counter-elapsed" id="exCounterElapsed"></span>
          </div>
        </div>
        <div class="timer-main">
          <div class="timer-label" id="timerLabel"></div>
          <div class="timer-display" id="timerDisplay"></div>
          <div class="rest-progress" id="progressWrap" style="display:none;">
            <div class="rest-progress-bar" id="progressBar" style="width:100%;"></div>
          </div>
        </div>
      </div>
      <div class="sets-row" id="setsRow"></div>

      <div class="list-title-row">
        <div class="section-label">종목 목록</div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="list-progress" id="listProgress"></span>
          <button class="edit-sheet-btn" onclick="Planner.openRoutineEditor(null, {name: Session.routineName, exercises: Session.exercises}, true)">✏ 편집</button>
        </div>
      </div>
      <div class="ex-list" id="exList"></div>
      <button class="copy-btn" id="midCopyBtn">📋 현재까지 기록 복사</button>
    </div>

    <div class="done-view" id="doneView" style="display:none;">
      <div class="done-big">운동 완료 🎉</div>
      <div class="done-sub" id="doneSub"></div>
      <div class="done-streak" id="doneStreak"></div>
      <button class="done-copy-btn" id="doneCopyBtn">📋 기록 복사 (Notion용)</button>
      <button class="reset-btn" id="resetBtn">다시 시작</button>
    </div>
  </div>

  <!-- ══ 플래너 탭 ══════════════════════════════════ -->
  <div id="plannerTab" style="display:none;">

    <div class="planner-section">
      <div class="section-label">내 루틴</div>
      <div id="routineList"></div>
      <button class="sheet-apply-btn" style="margin-top:4px;" onclick="Planner.openRoutineEditor()">+ 새 루틴 만들기</button>
    </div>

    <div class="planner-section">
      <div class="section-label">템플릿</div>
      <div id="tplPickList"></div>
    </div>

    <div class="planner-section">
      <div class="section-label">JSON 플래너 불러오기</div>
      <textarea class="planner-textarea" id="plannerInput" placeholder='{"label":"루틴 이름","exercises":[{"name":"플로어 프레스","sets":3}, ...]}'></textarea>
      <button class="planner-load-btn" id="plannerLoadBtn">불러오기</button>
      <div class="planner-msg" id="plannerMsg"></div>
    </div>
  </div>

  <!-- ══ 기록 탭 ══════════════════════════════════════ -->
  <div id="historyTab" style="display:none;">
    <div class="section-label" style="margin-bottom:10px;">대시보드</div>
    <div class="stat-cards">
      <div class="stat-card">
        <div class="stat-value" id="statStreak">0</div>
        <div class="stat-label">🔥 연속 운동일</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statWeekCount">0</div>
        <div class="stat-label">이번 주 운동 횟수</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statTotalDays">0</div>
        <div class="stat-label">총 운동 일수</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statTotalSets">0</div>
        <div class="stat-label">총 완료 세트</div>
      </div>
    </div>

    <div class="section-label" style="margin:14px 0 10px;">차트</div>
    <div class="chart-tabs">
      <button class="chart-tab active" data-mode="week">이번 주</button>
      <button class="chart-tab" data-mode="month">최근 30일</button>
    </div>
    <div id="chartContainer"></div>

    <div class="section-label" style="margin-top:14px;margin-bottom:8px;">운동 기록</div>
    <div id="historyList"></div>
  </div>

  <!-- ══ 설정 패널 (타이머 탭 하단 편집 시트 내부) ══ -->
  <!-- 설정은 플래너 시트 내 또는 별도 접근 -->
</div>

<!-- ══ 루틴 에디터 바텀시트 ══════════════════════════ -->
<div class="sheet-overlay" id="routineEditorSheetOverlay"></div>
<div class="sheet-panel" id="routineEditorSheet">
  <div class="sheet-handle-row"><div class="sheet-handle"></div></div>
  <div class="sheet-header">
    <div class="sheet-title">루틴 편집</div>
    <button class="sheet-close" id="closeEditorBtn">×</button>
  </div>
  <div class="sheet-body">
    <input class="editor-name-input" id="editorRoutineName" type="text" placeholder="루틴 이름">
    <div class="sheet-section-title" style="display:flex;justify-content:space-between;align-items:center;">
      <span>종목 <span style="font-weight:400;color:var(--muted);">(각 세트 수 개별 설정)</span></span>
      <span style="margin-right:36px;">세트</span>
    </div>
    <div id="editorExList"></div>
    <button class="sheet-add-btn" id="addEditorExBtn">+ 종목 추가</button>
    <button class="sheet-apply-btn" id="applyToSessionBtn" style="display:none;margin-bottom:8px;background:var(--success);">현재 운동에 적용</button>
    <button class="sheet-apply-btn" id="saveRoutineBtn">루틴으로 저장</button>
  </div>
</div>

<!-- ══ 기록 상세 바텀시트 ═════════════════════════════ -->
<div class="sheet-overlay" id="recordDetailSheetOverlay"></div>
<div class="sheet-panel" id="recordDetailSheet">
  <div class="sheet-handle-row"><div class="sheet-handle"></div></div>
  <div class="sheet-header">
    <div>
      <div class="sheet-title" id="detailRoutineName"></div>
      <div style="font-size:12px;color:var(--muted);margin-top:2px;" id="detailDate"></div>
    </div>
    <button class="sheet-close" id="closeDetailBtn">×</button>
  </div>
  <div class="sheet-body">
    <div id="detailExList"></div>
  </div>
</div>

<!-- ══ 설정 시트 ══════════════════════════════════════ -->
<div class="sheet-overlay" id="settingsSheetOverlay" onclick="closeSettingsSheet()"></div>
<div class="sheet-panel" id="settingsSheet">
  <div class="sheet-handle-row"><div class="sheet-handle"></div></div>
  <div class="sheet-header">
    <div class="sheet-title">설정</div>
    <button class="sheet-close" onclick="closeSettingsSheet()">×</button>
  </div>
  <div class="sheet-body">
    <div class="settings-section">
      <div class="section-label">휴식 시간</div>
      <div class="rest-bar">
        <label>휴식</label>
        <input type="range" id="restSlider" min="20" max="120" step="5" value="60">
        <span id="restVal">60초</span>
      </div>
    </div>
    <div class="settings-section">
      <div class="section-label">소리 & 진동</div>
      <div class="sound-bar">
        <label>완료음 / 진동</label>
        <label class="toggle" style="margin-left:auto;">
          <input type="checkbox" id="soundToggle" checked>
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
    </div>
    <div class="settings-section">
      <div class="section-label">화면 테마</div>
      <div class="theme-bar">
        <button class="theme-btn active" id="themeDark">🌙 다크</button>
        <button class="theme-btn" id="themeLight">☀️ 라이트</button>
      </div>
    </div>
  </div>
</div>

<!-- 설정 버튼 (우측 상단 고정) -->
<button
  onclick="openSettingsSheet()"
  style="position:fixed;top:12px;right:12px;width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50;">
  ⚙
</button>

<script src="js/state.js"></script>
<script src="js/timer.js"></script>
<script src="js/planner.js"></script>
<script src="js/history.js"></script>
<script src="js/app.js"></script>
<script>
function openSettingsSheet() {
  document.getElementById('settingsSheetOverlay').classList.add('open');
  document.getElementById('settingsSheet').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeSettingsSheet() {
  document.getElementById('settingsSheetOverlay').classList.remove('open');
  document.getElementById('settingsSheet').classList.remove('open');
  document.body.style.overflow = '';
}
</script>
</body>
</html>
